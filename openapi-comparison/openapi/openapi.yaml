openapi: 3.0.3
info:
  title: Library Management API (OpenAPI)
  version: 1.0.0
  description: Demo API tài liệu hóa theo chuẩn OpenAPI cho ứng dụng quản lý thư viện.
servers:
  - url: http://localhost:5007
paths:
  /books:
    get:
      summary: Lấy danh sách sách
      tags: [Books]
      responses:
        "200":
          description: Danh sách sách
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'
    post:
      summary: Thêm sách mới
      tags: [Books]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewBook'
      responses:
        "201":
          description: Tạo sách thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        "400":
          description: Dữ liệu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /books/{bookId}:
    parameters:
      - $ref: '#/components/parameters/BookId'
    get:
      summary: Lấy chi tiết 1 sách
      tags: [Books]
      responses:
        "200":
          description: Thông tin sách
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        "404":
          description: Không tìm thấy sách
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /loans:
    post:
      summary: Tạo phiếu mượn sách
      tags: [Loans]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewLoan'
      responses:
        "201":
          description: Tạo phiếu mượn thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Loan'
        "400":
          description: Dữ liệu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /loans/{loanId}:
    parameters:
      - $ref: '#/components/parameters/LoanId'
    delete:
      summary: Trả sách (xóa phiếu mượn)
      tags: [Loans]
      responses:
        "204":
          description: Trả sách thành công
        "404":
          description: Không tìm thấy phiếu mượn
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  parameters:
    BookId:
      name: bookId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    LoanId:
      name: loanId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

  schemas:
    Book:
      type: object
      required: [id, title, author, available]
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Dế Mèn Phiêu Lưu Ký
        author:
          type: string
          example: Tô Hoài
        available:
          type: boolean
          example: true

    NewBook:
      type: object
      required: [title, author]
      properties:
        title:
          type: string
          example: Lão Hạc
        author:
          type: string
          example: Nam Cao

    NewLoan:
      type: object
      required: [bookId, memberName]
      properties:
        bookId:
          type: integer
          example: 1
        memberName:
          type: string
          example: Nguyen Van A

    Loan:
      type: object
      required: [id, bookId, memberName, borrowedAt]
      properties:
        id:
          type: integer
          example: 10
        bookId:
          type: integer
          example: 1
        memberName:
          type: string
          example: Nguyen Van A
        borrowedAt:
          type: string
          format: date-time
          example: "2026-03-20T10:30:00Z"

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: Resource not found
